<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 220" width="1200" height="220">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="pipe" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#a78bfa" stop-opacity="0.1"/>
      <stop offset="50%" stop-color="#a78bfa" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#a78bfa" stop-opacity="0.1"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="220" fill="url(#bg)" rx="8"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.04" stroke="#e2e8f0" stroke-width="0.5">
    <line x1="0" y1="44" x2="1200" y2="44"/>
    <line x1="0" y1="88" x2="1200" y2="88"/>
    <line x1="0" y1="132" x2="1200" y2="132"/>
    <line x1="0" y1="176" x2="1200" y2="176"/>
    <line x1="120" y1="0" x2="120" y2="220"/>
    <line x1="240" y1="0" x2="240" y2="220"/>
    <line x1="360" y1="0" x2="360" y2="220"/>
    <line x1="480" y1="0" x2="480" y2="220"/>
    <line x1="600" y1="0" x2="600" y2="220"/>
    <line x1="720" y1="0" x2="720" y2="220"/>
    <line x1="840" y1="0" x2="840" y2="220"/>
    <line x1="960" y1="0" x2="960" y2="220"/>
    <line x1="1080" y1="0" x2="1080" y2="220"/>
  </g>

  <!-- Left side: Title and tagline -->
  <text x="60" y="85" fill="#e2e8f0" font-family="system-ui, -apple-system, sans-serif" font-size="38" font-weight="700" letter-spacing="-0.5">mcp-starter</text>
  <text x="60" y="118" fill="#94a3b8" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="400">Production-grade MCP server template</text>
  <text x="60" y="148" fill="#64748b" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="400">Build tools, not plumbing. Stdio transport, modular architecture, graceful shutdown.</text>

  <!-- Accent bar under title -->
  <rect x="60" y="94" width="48" height="3" rx="1.5" fill="url(#accent)" opacity="0.8"/>

  <!-- Right side: Architecture diagram -->

  <!-- Stdio transport pipe -->
  <rect x="640" y="85" width="160" height="50" rx="6" fill="none" stroke="#a78bfa" stroke-width="1.5" stroke-dasharray="6,4" opacity="0.5"/>
  <text x="720" y="105" fill="#a78bfa" font-family="monospace" font-size="10" text-anchor="middle" opacity="0.7">stdio transport</text>
  <!-- Data flow arrows inside pipe -->
  <text x="670" y="124" fill="#a78bfa" font-family="monospace" font-size="10" opacity="0.5">stdin</text>
  <line x1="700" y1="121" x2="740" y2="121" stroke="#a78bfa" stroke-width="1" opacity="0.4" marker-end="url(#arrowRight)"/>
  <text x="748" y="124" fill="#a78bfa" font-family="monospace" font-size="10" opacity="0.5">stdout</text>

  <!-- Core server box -->
  <rect x="830" y="55" width="140" height="110" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
  <rect x="830" y="55" width="140" height="28" rx="8" fill="#334155"/>
  <rect x="830" y="75" width="140" height="8" fill="#334155"/>
  <text x="900" y="74" fill="#e2e8f0" font-family="monospace" font-size="11" text-anchor="middle" font-weight="600">MCP Server</text>

  <!-- Tool slots inside server -->
  <rect x="845" y="95" width="110" height="22" rx="4" fill="#0f172a" stroke="#475569" stroke-width="0.75"/>
  <circle cx="856" cy="106" r="4" fill="#a78bfa" opacity="0.8"/>
  <text x="866" y="110" fill="#94a3b8" font-family="monospace" font-size="9">create_item</text>

  <rect x="845" y="123" width="110" height="22" rx="4" fill="#0f172a" stroke="#475569" stroke-width="0.75"/>
  <circle cx="856" cy="134" r="4" fill="#a78bfa" opacity="0.6"/>
  <text x="866" y="138" fill="#94a3b8" font-family="monospace" font-size="9">your_tool</text>

  <!-- Empty slot indicator -->
  <rect x="845" y="150" width="110" height="12" rx="3" fill="none" stroke="#475569" stroke-width="0.5" stroke-dasharray="3,3" opacity="0.4"/>

  <!-- Connection line: pipe to server -->
  <line x1="800" y1="110" x2="830" y2="110" stroke="#a78bfa" stroke-width="1.2" opacity="0.4"/>
  <circle cx="826" cy="110" r="2.5" fill="#a78bfa" opacity="0.6"/>

  <!-- Shutdown handler -->
  <rect x="1000" y="72" width="120" height="32" rx="5" fill="#0f172a" stroke="#475569" stroke-width="0.75"/>
  <text x="1060" y="92" fill="#64748b" font-family="monospace" font-size="9" text-anchor="middle">shutdown handler</text>

  <!-- Connection: server to shutdown -->
  <line x1="970" y1="88" x2="1000" y2="88" stroke="#475569" stroke-width="0.75"/>

  <!-- Signal labels -->
  <text x="1060" y="122" fill="#475569" font-family="monospace" font-size="8" text-anchor="middle">SIGINT / SIGTERM</text>

  <!-- protectyr-labs watermark -->
  <text x="1140" y="205" fill="#334155" font-family="system-ui, sans-serif" font-size="10" text-anchor="end">protectyr-labs</text>
</svg>